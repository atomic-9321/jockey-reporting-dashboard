name: Data Refresh

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: "0 0,6,12,18 * * *"
    # Monday 5am UTC (7am CET) — trigger weekly insight generation
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      region:
        description: "Region to refresh (eu, uk, or all)"
        required: false
        default: "all"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install requests python-dotenv google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client facebook-business

      - name: Debug secret lengths
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        run: |
          echo "META_ACCESS_TOKEN length: ${#META_ACCESS_TOKEN}"
          echo "BLOB_READ_WRITE_TOKEN length: ${#BLOB_READ_WRITE_TOKEN}"
          echo "GOOGLE_OAUTH_TOKEN_JSON length: ${#GOOGLE_OAUTH_TOKEN_JSON}"
          echo "META_ACCESS_TOKEN starts with: ${META_ACCESS_TOKEN:0:4}"
          echo "BLOB_READ_WRITE_TOKEN starts with: ${BLOB_READ_WRITE_TOKEN:0:10}"

      - name: Run data refresh
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_EU_ACCOUNT_ID: ${{ secrets.META_EU_ACCOUNT_ID }}
          META_UK_ACCOUNT_ID: ${{ secrets.META_UK_ACCOUNT_ID }}
          META_TOKEN_CREATED_AT: ${{ secrets.META_TOKEN_CREATED_AT }}
          GOOGLE_SHEETS_EU_ID: ${{ secrets.GOOGLE_SHEETS_EU_ID }}
          GOOGLE_SHEETS_UK_ID: ${{ secrets.GOOGLE_SHEETS_UK_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          NOTIFICATION_SLACK_WEBHOOK: ${{ secrets.NOTIFICATION_SLACK_WEBHOOK }}
        run: |
          REGION="${{ github.event.inputs.region || 'all' }}"
          python tools/refresh_all_data.py --region "$REGION"

  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on Monday schedule or manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: refresh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install requests python-dotenv google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client facebook-business anthropic

      - name: Generate weekly report and insights on Monday
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DASHBOARD_BASE_URL: ${{ secrets.DASHBOARD_BASE_URL }}
        run: |
          # On schedule triggers, only run on Mondays; manual dispatch always runs
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DAY_OF_WEEK=$(date +%u)
            if [ "$DAY_OF_WEEK" != "1" ]; then
              echo "Not Monday — skipping weekly report generation"
              exit 0
            fi
          fi

          # Calculate the most recent completed CW
          CW=$(python3 -c "
          from datetime import date, timedelta
          today = date.today()
          # Find the most recent completed week (last Sunday)
          days_since_monday = today.weekday()
          if days_since_monday == 0:
              # Monday: previous week completed yesterday
              last_monday = today - timedelta(days=7)
          else:
              # Other days: find the Monday of the most recent completed week
              last_monday = today - timedelta(days=days_since_monday + 7)
          iso = last_monday.isocalendar()
          print(f'{iso[0]}-CW{iso[1]:02d}')
          ")
          echo "Generating weekly report for $CW"

          # Generate HTML report (includes AI insights for the report)
          python tools/generate_weekly_report.py --cw "$CW"

          # Pre-generate dashboard insights for both regions and save to Blob
          echo "Pre-generating dashboard insights for $CW"
          python3 -c "
          import json, os, sys
          sys.path.insert(0, '.')
          from tools.generate_weekly_report import build_region_data, parse_cw_key
          from tools.utils.insights import generate_ai_insights
          from tools.utils.blob_client import upload_json

          year, cw = parse_cw_key('$CW')
          for region in ['uk', 'eu']:
              print(f'Generating dashboard insights for {region.upper()} {\"$CW\"}')
              region_data = build_region_data(region, '$CW', year, cw)
              if not region_data:
                  print(f'  No data for {region.upper()}')
                  continue
              insights = generate_ai_insights(region_data, region, '$CW', 'weekly')
              if insights:
                  insights['generated_at'] = __import__('datetime').datetime.now().isoformat()
                  insights['region'] = region.upper()
                  insights['period'] = '$CW'
                  insights['prompt_version'] = 'v1'
                  filename = f'insights_{region.upper()}_$CW_report.json'
                  upload_json(filename, insights)
                  print(f'  Saved {filename} to Blob')
              else:
                  print(f'  AI insights failed for {region.upper()}')
          "
